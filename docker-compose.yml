version: '3.8'

services:
  ros2-gazebo:
    build:
      context: .
      dockerfile: Dockerfile
    image: robot-homework-ros:humble
    container_name: ros2_gazebo_dev
    network_mode: host
    privileged: true

    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all

    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ./ros2_ws:/root/ros2_ws:rw
      - ./scripts:/root/scripts:ro
      - ./repos:/root/repos:ro

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    command: tail -f /dev/null
