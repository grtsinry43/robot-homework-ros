# ros2_control for Panda in Gazebo (gz_ros2_control) — same names as my_panda_moveit_config.
# gz_ros2_control with a position command interface converts position error to a joint
# VELOCITY command scaled by position_proportional_gain. At gain 0.5 the wrist joints
# (5/6/7) sagged ~3 rad under gravity and the arm never reached the commanded grasp pose.
# Raise the gain so the controller holds position, and run the loop at 1 kHz like the
# gz_ros2_control position demos.
gz_ros2_control:
  ros__parameters:
    position_proportional_gain: 15.0

controller_manager:
  ros__parameters:
    update_rate: 1000

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    panda_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    panda_gripper_controller:
      type: joint_trajectory_controller/JointTrajectoryController

panda_arm_controller:
  ros__parameters:
    joints:
      - panda_joint1
      - panda_joint2
      - panda_joint3
      - panda_joint4
      - panda_joint5
      - panda_joint6
      - panda_joint7
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity

panda_gripper_controller:
  ros__parameters:
    joints:
      - panda_finger_joint1
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
